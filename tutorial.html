  pages: [
    {s:"Welcome",t:"Welcome to paw",art:`        _______________

     p a w
     Personal Agent Workflows
     an AI SDLC starter kit`,body:"Your AI agent writes code fast.<br>paw makes sure it writes code <strong>right</strong>."},
    {s:"The Problem",t:"The Problem",body:`<pre>  You:    "Add a login endpoint"

  AI:     <span class="g">+ Wrote the endpoint</span>
          <span class="g">+ Handles POST /login</span>
          <span class="g">+ Returns a JWT</span>

          <span class="y">- No rate limiting</span>
          <span class="y">- No brute-force protection</span>
          <span class="y">- Logs the password in plaintext</span>
          <span class="y">- JWT secret is hardcoded</span>
          <span class="y">- No test</span></pre>The AI did what you asked. The problem is what you <strong>didn't</strong> ask.`},
    {s:"The Problem",t:"Two Choices",body:`<p><strong>OPTION A:</strong> You review everything the AI writes. You are now a full-time AI babysitter. That doesn't scale.</p><br><p><strong>OPTION B:</strong> You teach the AI your standards, and build a system that enforces them BEFORE the code reaches you.</p><br><p class="g">paw is Option B.</p>`},
    {s:"Components",t:"Four Building Blocks",body:`<table><tr><th>Block</th><th>Role</th><th>Example</th></tr>
<tr><td class="g">AGENT</td><td>WHO does the work</td><td>"You are a thorough code reviewer who catches edge cases."</td></tr>
<tr><td class="g">SKILL</td><td>WHAT it knows how to do</td><td>"When reviewing, check for security, test coverage, and naming."</td></tr>
<tr><td class="y">HOOK</td><td>WHEN it runs automatically</td><td>"Before every commit, run the linter. If it fails, block it."</td></tr>
<tr><td class="m">RULE</td><td>WHY it matters</td><td>"All functions must have error handling. No secrets in code."</td></tr></table>
<p>Rules can be broken — hooks <strong>can't</strong>. That's the whole thing.</p>`},
    {s:"Components",t:"Portable by Design",body:`<table><tr><th>Tool</th><th>Reads your .md files?</th></tr>
<tr><td>Claude Code</td><td class="g">✓</td></tr>
<tr><td>Cursor</td><td class="g">✓</td></tr>
<tr><td>Codex CLI</td><td class="g">✓</td></tr>
<tr><td>Whatever's next</td><td class="g">✓ — they're just markdown</td></tr></table>
<p>If you get good at a company platform and then leave — you can't take it with you. If you get good at writing agents and rules — <strong>that's yours forever</strong>.</p>`},
    {s:"Components",t:"The Key Distinction",body:`<table><tr><th></th><th>AGENTS</th><th>SKILLS</th><th>HOOKS</th></tr>
<tr><td>What</td><td>AI actors</td><td>Knowledge</td><td>Scripts</td></tr>
<tr><td>Has AI?</td><td>Yes</td><td>No (teaches)</td><td>No (enforces)</td></tr>
<tr><td>Decides?</td><td>Yes — judgment</td><td>No — informs</td><td>No — reacts</td></tr>
<tr><td>Runs</td><td>On dispatch</td><td>When loaded</td><td>On events</td></tr>
<tr><td>Can fail</td><td>Yes (retry)</td><td>N/A</td><td>Yes (blocks)</td></tr>
<tr><td>Count</td><td>18</td><td>7</td><td>4</td></tr>
<tr><td>Lives in</td><td>agents/</td><td>skills/</td><td>hooks/</td></tr></table>
<p>Agents without skills are smart but uninformed. Skills without agents are knowledge with no one to use it. Hooks without either still enforce the rules — that's the point.</p>`},
    {s:"Agents",t:"18 Agents, 5 Phases",body:`<table><tr><th>Phase</th><th>Agents</th></tr>
<tr><td>Plan</td><td>architect, planner, devils-advocate, rollback-planner</td></tr>
<tr><td>Build</td><td>builder, merge-resolver, migration-architect</td></tr>
<tr><td>Review</td><td>code-reviewer, bug-auditor, security-reviewer, perf-checker, fe-reviewer, php-reviewer, test-runner, integration-tester, environment-checker</td></tr>
<tr><td>Respond</td><td>incident-commander</td></tr>
<tr><td>Document</td><td>docs-writer</td></tr></table>
<p>14 of 18 agents have restricted permissions. Trust through structural limitation.</p>`},
    {s:"Agents",t:"Trust Through Structural Limitation",body:`<table><tr><th>Tier</th><th>Count</th><th>Can do</th></tr>
<tr><td class="g">Read-only</td><td>10</td><td>Look and report. Cannot modify.</td></tr>
<tr><td class="y">Read+Bash</td><td>3</td><td>Run tests. Cannot edit code.</td></tr>
<tr><td class="m">Read+Write</td><td>1</td><td>Edit docs. Cannot run commands.</td></tr>
<tr><td class="r">Full</td><td>4</td><td>Full power. Isolated.</td></tr></table>`},
    {s:"Hooks & Rules",t:"Hooks: Mechanical Enforcement",body:`<pre>  You type:  <span class="y">git rebase main</span>

  ┌────────────────────────────────────────────┐
  │  hooks/git_safety.py fires                 │
  │                                            │
  │  <span class="r">&gt;&gt;&gt; BLOCKED &lt;&lt;&lt;</span>                            │
  │                                            │
  │  'git rebase rewrites published history.   │
  │   Use git pull origin &lt;branch&gt; instead.'   │
  │                                            │
  │  The command <strong>NEVER</strong> executes.               │
  └────────────────────────────────────────────┘</pre><p>Hooks don't suggest. They <strong>block</strong>.</p>`},
    {s:"Hooks & Rules",t:"Rules: Standards as Doctrine",body:`<p>6 rules. Each a markdown file. Enforced, not suggested.</p>
<table><tr><th>Rule</th><th>What it enforces</th></tr>
<tr><td>git-doctrine</td><td>Always merge, never rebase</td></tr>
<tr><td>test-first</td><td>Tests before code, always</td></tr>
<tr><td>error-handling</td><td>No silent failures, ever</td></tr>
<tr><td>no-secrets-in-code</td><td>Secrets in env vars only</td></tr>
<tr><td>branch-hygiene</td><td>Feature branch per task</td></tr>
<tr><td>security-basics</td><td>Validate input, encode output</td></tr></table>`},
    {s:"Hooks & Rules",t:"Mechanical, Not Cultural",body:`<p><strong>BEFORE</strong> (tribal knowledge):</p>
<pre>  "Hey, don't forget to write tests"
  "We don't rebase here"
  "Make sure you validate input"</pre>
<p><strong>AFTER</strong> (mechanical enforcement):</p>
<pre>  rules/test-first.md    → test-runner gate <span class="r">BLOCKS</span>
  rules/git-doctrine.md  → hooks/git_safety.py <span class="r">BLOCKS</span>
  rules/security-basics   → security-reviewer <span class="y">REPORTS</span></pre>
<p>Tribal knowledge gets forgotten. Style guides get skipped. paw makes enforcement <strong>mechanical</strong>: Rule → Agent enforces → Hook prevents.</p>`},
  ]

    {s:"What to Build",t:"What You Can Build",body:`<table><tr><th>Type</th><th>How</th></tr>
<tr><td class="g">Agents</td><td>Follow <code>agents/architect.md</code> pattern. Pick context, rules, minimum tools. Default to read-only.</td></tr>
<tr><td class="g">Rules</td><td>Follow <code>rules/git-doctrine.md</code> pattern. Statement, why, hard rules, enforced by.</td></tr>
<tr><td class="g">Skills</td><td>Create <code>skills/your-skill/SKILL.md</code> with domain knowledge.</td></tr>
<tr><td class="y">Hooks</td><td>Changes to hooks/ require tests. Security-critical code.</td></tr>
<tr><td class="g">Tests</td><td>More coverage always welcome. Edge cases in hooks especially.</td></tr></table>`},
    {s:"Submit",t:"Before You Submit",body:`<p>Every PR must pass these checks:</p>
<pre>  python3 -m pytest tests/ -v
  ruff check .
  ruff format --check .</pre>
<p>If <code>ruff format</code> fails, auto-fix: <code>ruff format .</code></p><br>
<p><strong>PR guidelines:</strong></p>
<ul style="padding-left:1.5rem">
<li>One feature or fix per PR</li>
<li>Clear description of what and why</li>
<li>Reference related issues</li>
<li>Tests before code</li>

<p>See <a href="CONTRIBUTING.md" style="color:var(--cyan)">CONTRIBUTING.md</a> for the full guide.</p>`},
  ]
}
};

let currentTrack = null, currentPage = 0;
const app = document.getElementById('app');

function renderMenu() {
  currentTrack = null;
  document.getElementById('sidebar').innerHTML = '';
  let html = `<div class="logo"><pre class="art">        _______________
       /               \\
      |  ┌───┐ ┌───┐  |
      |  │ ● │ │ ● │  |
      |  └───┘ └───┘  |
      |      ___      |
      |     /   \\     |
      |    | === |    |
       \\   \\_____/   /
        \\___________/
         /    |    \\
        *     *     *

     p a w
     Personal Agent Workflows</pre></div>
<h2>Choose a tutorial track:</h2>
<div class="track-select">`;
  for (const [id, t] of Object.entries(TRACKS)) {
    html += `<div class="track-card" onclick="startTrack('${id}')">
      <h3>${t.title}</h3>
      <p>${t.desc}</p>
      <span class="time">${t.time}</span>
    </div>`;
  }
  html += `</div>
<div style="text-align:center;margin-top:1.5rem">
  <a href="cheatsheet.html" target="_blank" style="color:var(--cyan);text-decoration:none;border:1px solid var(--border);padding:.5rem 1.2rem;border-radius:6px;font-size:.85rem">
    📋 Quick Reference Card (printable / save as PDF)
  </a>
</div>`;
  app.innerHTML = html;
}

function startTrack(id) {
  currentTrack = id;
  currentPage = 0;
  renderPage();
}

function renderPage() {
  const t = TRACKS[currentTrack];
  const p = t.pages[currentPage];
  const sections = t.sections;
  const curSection = p.s;

  // Sidebar
  const sb = document.getElementById('sidebar');
  let shtml = `<div class="sidebar-label">${t.title.toUpperCase()}</div>`;
  const secFirst = {};
  t.pages.forEach((pg,i) => { if (!(pg.s in secFirst)) secFirst[pg.s] = i; });
  sections.forEach(s => {
    const fi = secFirst[s];
    const cls = s===curSection?'active':(fi<currentPage?'done':'');
    const m = s===curSection?'▸':(fi<currentPage?'✓':'·');
    shtml += `<div class="sidebar-item ${cls}" onclick="currentPage=${fi};renderPage()">${m} ${s}</div>`;
  });
  sb.innerHTML = shtml;

  // Content
  let html = `<button class="back-btn" onclick="renderMenu()">← Back to tracks</button>`;
  html += `<h1>${p.t}</h1><div class="underline">────────────────────</div>`;
  if (p.art) html += `<pre class="art">${p.art}</pre>`;
  html += p.body;
  html += `<div class="nav">
    <button onclick="go(-1)" ${currentPage===0?'disabled':''}>← Back</button>
    <span class="progress">${currentPage+1} / ${t.pages.length}</span>
    <button onclick="go(1)">${currentPage===t.pages.length-1?'Back to tracks →':'Next →'}</button>
  </div>`;
  app.innerHTML = html;
}

function go(dir) {
  const t = TRACKS[currentTrack];
  if (dir > 0 && currentPage >= t.pages.length - 1) { renderMenu(); return; }
  currentPage = Math.max(0, Math.min(t.pages.length-1, currentPage+dir));
  renderPage();
}

document.addEventListener('keydown', e => {
  if (!currentTrack) return;
  if (e.key==='ArrowRight'||e.key===' ') go(1);
  if (e.key==='ArrowLeft') go(-1);
  if (e.key==='Escape') renderMenu();
});

renderMenu();
</script>
</body>
