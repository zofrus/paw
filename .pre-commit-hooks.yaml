# paw git safety hooks for the pre-commit framework
# Add to your project's .pre-commit-config.yaml:
#
#   repos:
#     - repo: https://github.com/zofrus/paw
#       rev: v0.2.0
#       hooks:
#         - id: paw-branch-guard
#
# These hooks run natively in git (not Claude Code).

- id: paw-branch-guard
  name: paw branch guard
  description: Block commits on protected branches (main, master, develop)
  entry: python3 hooks/branch_guard_precommit.py
  language: python
  always_run: true
  pass_filenames: false
  stages: [pre-commit]
